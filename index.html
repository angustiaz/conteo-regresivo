<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteo Regresivo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Conteo Regresivo</h1>
        <p id="event-name">Hasta mi próximo cumpleaños 🎉</p>
        
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <p>Días</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>
        
        <p id="message" class="hidden">¡El tiempo ha terminado! 🎊</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
